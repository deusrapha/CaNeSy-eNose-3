<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaNeSy-eNose Final Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            transition: background-color 0.3s ease;
        }

        body.danger {
            background-color: #450a0a;
            animation: pulse-danger 1.5s infinite;
        }

        @keyframes pulse-danger {
            0% { box-shadow: inset 0 0 0px 0px rgba(248, 113, 113, 0.5); }
            50% { box-shadow: inset 0 0 50px 20px rgba(248, 113, 113, 0.5); }
            100% { box-shadow: inset 0 0 0px 0px rgba(248, 113, 113, 0.5); }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent-blue);
        }

        .status-pill {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
            flex-grow: 1;
        }

        .card {
            background-color: var(--panel-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Span classes for layout */
        .col-span-8 { grid-column: span 8; }
        .col-span-4 { grid-column: span 4; }
        .col-span-12 { grid-column: span 12; }

        .card-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .metric-unit {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .alert-banner {
            display: none;
            background-color: rgba(248, 113, 113, 0.2);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        body.danger .alert-banner {
            display: block;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        .classification-text {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
        }

        .class-PureCO { color: var(--accent-red); }
        .class-PureEthylene { color: var(--accent-blue); }
        .class-Mixture { color: #c084fc; } /* purple */
        .class-Air { color: var(--accent-green); }

        @media (max-width: 1024px) {
            .col-span-8, .col-span-4 { grid-column: span 12; }
        }
    </style>
</head>
<body>

    <header>
        <h1>CaNeSy-eNose System</h1>
        <div class="status-pill" id="connection-status">Connecting to Edge Node...</div>
    </header>

    <div class="alert-banner" id="alert-banner">
        ⚠️ TOXIC GAS CONCENTRATION DETECTED! INITIATING GRADIENT ASCENT OVERRIDE.
    </div>

    <div class="grid">
        <!-- Main Chart -->
        <div class="card col-span-8">
            <h2 class="card-title">Real-Time Concentration Regression</h2>
            <div style="position: relative; height: 400px; width: 100%;">
                <canvas id="concentrationChart"></canvas>
            </div>
        </div>

        <!-- Sidebar Metrics -->
        <div class="card col-span-4" style="display: flex; flex-direction: column; gap: 1rem;">
            
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                <h2 class="card-title">Gas Classification</h2>
                <div class="classification-text" id="class-state">Loading...</div>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1rem 0;">

            <div>
                <h2 class="card-title">Environmental Overlay (Wind)</h2>
                <div class="metric-value" id="velocity-val" style="color: var(--text-main);">0.0 <span class="metric-unit">m/s</span></div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 1rem 0;">

            <div>
                <h2 class="card-title">Inference Latency</h2>
                <div class="metric-value" id="latency-val" style="font-size: 2rem;">0 <span class="metric-unit">ms</span></div>
            </div>
            
        </div>
    </div>

    <script>
        // Setup Chart.js
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        const ctx = document.getElementById('concentrationChart').getContext('2d');
        
        const maxDataPoints = 60; // 6 seconds at 10Hz
        
        const chartData = {
            labels: Array(maxDataPoints).fill(''),
            datasets: [
                {
                    label: 'CO (ppm)',
                    data: Array(maxDataPoints).fill(0),
                    borderColor: '#f87171',
                    backgroundColor: 'rgba(248, 113, 113, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                },
                {
                    label: 'Ethylene (ppm)',
                    data: Array(maxDataPoints).fill(0),
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }
            ]
        };

        const config = {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#334155' }
                    },
                    x: {
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                    }
                }
            }
        };

        const myChart = new Chart(ctx, config);

        // SSE Connection
        const eventSource = new EventSource('/stream');
        
        const statusEl = document.getElementById('connection-status');
        const classStateEl = document.getElementById('class-state');
        const velocityValEl = document.getElementById('velocity-val');
        const latencyValEl = document.getElementById('latency-val');
        
        eventSource.onopen = function() {
            statusEl.textContent = '🟢 Connected to Edge (ONNX)';
            statusEl.style.color = 'var(--accent-green)';
        };

        eventSource.onerror = function() {
            statusEl.textContent = '🔴 Connection Lost';
            statusEl.style.color = 'var(--accent-red)';
        };

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update Chart
            chartData.datasets[0].data.push(data.co_ppm);
            chartData.datasets[0].data.shift();
            
            chartData.datasets[1].data.push(data.eth_ppm);
            chartData.datasets[1].data.shift();
            
            myChart.update();

            // Update Class State
            classStateEl.textContent = data.predicted_state;
            
            // Reset classes
            classStateEl.className = 'classification-text';
            
            if (data.predicted_state === 'Pure CO') {
                classStateEl.classList.add('class-PureCO');
            } else if (data.predicted_state === 'Pure Ethylene') {
                classStateEl.classList.add('class-PureEthylene');
            } else if (data.predicted_state === 'Mixture') {
                classStateEl.classList.add('class-Mixture');
            } else {
                classStateEl.classList.add('class-Air');
            }

            // Update Metrics
            velocityValEl.innerHTML = `${data.velocity.toFixed(2)} <span class="metric-unit">m/s</span>`;
            latencyValEl.innerHTML = `${data.latency_ms.toFixed(1)} <span class="metric-unit">ms</span>`;

            // Danger State Logic
            if (data.co_ppm > 5.0 || data.eth_ppm > 5.0) {
                document.body.classList.add('danger');
            } else {
                document.body.classList.remove('danger');
            }
        };
    </script>
</body>
</html>
